<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Operaciones Dólar</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
background:#f4f5f7;
padding:10px;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
color:#111827
}

.app{
max-width:430px;
margin:auto
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:18px;
padding:12px;
margin-bottom:10px;
box-shadow:0 3px 12px rgba(0,0,0,.04)
}

h1{
font-size:20px;
margin:0
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px
}

.today{
font-size:12px;
font-weight:800;
color:#666
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:7px
}

input{
width:100%;
padding:10px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px
}

.sbtn{
border:0;
border-radius:12px;
padding:10px;
font-size:14px;
font-weight:900;
background:#eef0f3
}

.sbtn.active{
background:#111827;
color:white
}

.box{
background:#eef0f3;
border-radius:14px;
padding:10px;
margin-top:7px
}

.dark{
background:#111827;
color:white
}

.small{
font-size:11px;
font-weight:800;
color:#666
}

.dark .small{
color:#cbd5e1
}

.big{
font-size:22px;
font-weight:950;
margin-top:3px
}

.btnrow{
display:grid;
grid-template-columns:1fr 1fr;
gap:7px;
margin-top:8px
}

.btn{
border:0;
border-radius:12px;
padding:11px;
font-size:14px;
font-weight:950;
background:#111827;
color:white
}

.wsp{
background:#25D366;
color:#063b19
}
</style></head>
<body>

<h1>PRUEBA OPS</h1>

</body>
</html>
