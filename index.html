<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Operaciones Dólar</title>
<style>
:root{--bg:#f4f5f7;--card:#fff;--dark:#111827;--muted:#667085;--line:#e5e7eb}
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;margin:0;background:var(--bg);padding:12px;color:#111827}
.app{max-width:430px;margin:auto}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:0 3px 12px rgba(0,0,0,.04)}
h1{font-size:22px;margin:0;letter-spacing:-.03em}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.today{font-size:13px;color:#666;font-weight:700;white-space:nowrap}
.seg,.state,.grid{display:grid;gap:6px}
.seg{grid-template-columns:1fr 1fr;margin-top:10px}
.state{grid-template-columns:1fr 1fr;margin-top:8px}
.grid{grid-template-columns:1fr 1fr}
button{font-family:inherit}
.sbtn{border:0;border-radius:12px;padding:11px;font-size:15px;font-weight:800;background:#eef0f3;color:#344054}
.sbtn.active{background:#111827;color:white}
.sbtn.compra.active{background:#dcfce7;color:#166534}
.sbtn.venta.active{background:#fee2e2;color:#991b1b}
.btn{border:0;border-radius:12px;padding:12px;font-size:16px;font-weight:900;background:#111827;color:white;margin-top:10px;width:100%}
input{width:100%;padding:11px;border:1px solid #ddd;border-radius:12px;font-size:16px;background:white}
.box{background:#eef0f3;border-radius:14px;padding:10px;margin-top:10px}
.small{font-size:12px;color:#666;font-weight:700}
.big{font-size:22px;font-weight:900;letter-spacing:-.03em}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin:10px 0}
.tab{border:0;border-radius:12px;padding:10px;font-weight:900;background:#e5e7eb;color:#344054}
.tab.active{background:#111827;color:white}
.hidden{display:none}
.op{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin-bottom:8px}
.op strong{font-size:15px}.meta{font-size:12px;color:#667085;margin-top:3px}.total{font-weight:900;margin-top:5px}
.actions{display:flex;gap:6px;margin-top:8px}
.actions button{flex:1;border:0;border-radius:10px;padding:8px;font-weight:800;background:#eef0f3}
.danger{background:#fee2e2!important;color:#991b1b}
</style>
</head>
<body>
<!-- Si querés, te paso el archivo completo en ZIP para evitar errores de copiado -->
</body>
</html>
