<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Ops</title><style>
body{font-family:-apple-system;margin:0;background:#f4f5f7;padding:10px;color:#111827}.app{max-width:430px;margin:auto}.card{background:white;border-radius:18px;padding:12px;margin-bottom:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}button,input{font-size:15px;border-radius:12px;padding:10px;border:1px solid #ddd}button{border:0;font-weight:900;background:#eef0f3}.on{background:#111827;color:white}.btn{background:#111827;color:white;width:100%}.wsp{background:#25D366;color:#063b19}.box{background:#eef0f3;border-radius:14px;padding:10px;margin-top:7px}.dark{background:#111827;color:white}.s{font-size:11px;color:#666;font-weight:800}.b{font-size:22px;font-weight:950}.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}.hide{display:none}.op{background:white;border:1px solid #ddd;border-radius:12px;padding:9px;margin:7px 0}
</style></head><body><div class="app">
<div class="tabs"><button onclick="tab('c')">Cargar</button><button onclick="tab('h')">Historial</button><button onclick="tab('r')">Resumen</button></div>

<section id="c"><div class="card">
<h2>Nueva operación <small id="hoy"></small></h2>
<div class="grid"><button id="bc" onclick="tipo='C';sel()">Compra</button><button id="bv" class="on" onclick="tipo='V';sel()">Venta</button></div>
<input id="nom" placeholder="Nombre" style="width:100%;margin-top:7px">
<div class="grid" style="margin-top:7px"><input id="usd" placeholder="USD" oninput="tot()"><input id="cot" placeholder="Cotización" oninput="tot()"></div>
<div class="box"><div class="s">Total pesos</div><div class="b" id="total">$0</div></div>
<div class="grid" style="margin-top:7px"><button id="liq" class="on" onclick="est='Liquidada';selE()">Liquidada</button><button id="pen" onclick="est='Pendiente';selE()">Pendiente</button></div>
<div class="grid" style="margin-top:7px"><button id="med" onclick="est='Me deben USD';selE()">Me deben</button><button id="deb" onclick="est='Debo USD';selE()">Debo</button></div>
<div class="grid" style="margin-top:7px"><button class="btn" onclick="guardar()">Guardar op.</button><button class="wsp" onclick="wsp()">Enviar Wsp</button></div>
</div>

<div class="card">
<div class="grid"><div class="box"><div class="s">Vendido</div><div class="b" id="v">USD 0</div></div><div class="box"><div class="s">Comprado</div><div class="b" id="co">USD 0</div></div></div>
<div class="box dark"><div class="s">Posición vendida en USD</div><div class="b" id="pos">USD 0</div></div>
<div class="box"><div class="s">Posición vendida en pesos</div><div class="b" id="posp">$0</div></div>
<div class="box"><div class="s">Precio venta cierre</div><input id="cie" value="1425" oninput="render()"></div>
<div class="box"><div class="s">Ganancia</div><div class="b" id="gan">$0</div></div>
</div></section>

<section id="h" class="hide"><div class="card"><h2>Historial</h2><div id="list"></div></div></section>
<section id="r" class="hide"><div class="card"><h2>Resumen</h2><div id="res"></div><button class="btn" onclick="borrar()">Borrar todo</button></div></section>
</div><script>
let tipo='V',est='Liquidada',ops=JSON.parse(localStorage.ops||'[]'),ult=null;
hoy.innerText=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'});
function n(x){return Number(String(x||0).replace(',','.'))}function ars(x){return '$'+Math.round(x||0).toLocaleString('es-AR')}function us(x){return 'USD '+Math.round(x||0).toLocaleString('es-AR')}
function sel(){bc.className=tipo=='C'?'on':'';bv.className=tipo=='V'?'on':''}
function selE(){liq.className=est=='Liquidada'?'on':'';pen.className=est=='Pendiente'?'on':'';med.className=est=='Me deben USD'?'on':'';deb.className=est=='Debo USD'?'on':''}
function tot(){total.innerText=ars(n(usd.value)*n(cot.value))}
function guardar(){let u=n(usd.value),c=n(cot.value),no=nom.value.trim();if(!u||!c||!no){alert('Falta algo');return}let o={id:Date.now(),tipo,usd:u,cot:c,nom:no,est,total:u*c};ops.unshift(o);ult=o;localStorage.ops=JSON.stringify(ops);usd.value='';cot.value='';nom.value='';tot();render()}
function msg(o){return (o.tipo=='V'?'V. ':'C. ')+o.usd+' x '+o.cot+' '+o.nom}
function wsp(){if(!ult)ult=ops[0];if(!ult)return alert('No hay operación');location.href='https://wa.me/?text='+encodeURIComponent(msg(ult))}
function calc(){let vv=ops.filter(o=>o.tipo=='V'),cc=ops.filter(o=>o.tipo=='C'),uv=vv.reduce((s,o)=>s+o.usd,0),uc=cc.reduce((s,o)=>s+o.usd,0),pv=vv.reduce((s,o)=>s+o.total,0),pc=cc.reduce((s,o)=>s+o.total,0),p=uv-uc,ci=n(cie.value),pp=p*ci,g=pv-pc-pp;return{uv,uc,pv,pc,p,pp,g}}
function render(){let x=calc();v.innerText=us(x.uv);co.innerText=us(x.uc);pos.innerText=us(x.p);posp.innerText=ars(x.pp);gan.innerText=ars(x.g);list.innerHTML=ops.map(o=>'<div class=op>'+(o.tipo=='V'?'🔴 V. ':'🟢 C. ')+o.usd+' x '+o.cot+' '+o.nom+'<br><small>'+o.est+'</small></div>').join('');res.innerHTML='Ventas: '+ars(x.pv)+'<br>Compras: '+ars(x.pc)+'<br>Pesos netos: '+ars(x.pv-x.pc)}
function tab(i){c.className=i=='c'?'':'hide';h.className=i=='h'?'':'hide';r.className=i=='r'?'':'hide'}
function borrar(){if(confirm('Borrar todo?')){ops=[];localStorage.ops='[]';render()}}
render();
</script></body></html>
