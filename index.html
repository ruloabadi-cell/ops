<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OPS</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f4f5f7;color:#111827;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding:7px}
.app{max-width:430px;margin:auto}
.tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.tab{border:0;border-radius:11px;padding:11px 4px;font-size:15px;font-weight:900;background:#e9edf2;color:#0f172a}
.tab.on{background:#111827;color:white}
.card{background:white;border-radius:15px;padding:8px;margin-bottom:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
input,select{font-size:16px;border:1px solid #ddd;border-radius:10px;padding:8px;background:white;width:100%;height:38px}
button{font-family:inherit;border:0;border-radius:10px;padding:9px;font-size:14px;font-weight:900;background:#eef0f3;color:#111827}
.btn{background:#111827;color:white;width:100%}
.wsp{background:#25D366!important;color:#063b19!important}
.danger{background:#fee2e2!important;color:#991b1b!important}
.edit{background:#dbeafe!important;color:#1e40af!important}
.on{background:#111827!important;color:white!important}
.box{background:#eef0f3;border-radius:11px;padding:8px;margin-top:6px}
.dark{background:#111827;color:white}
.label{font-size:13px;line-height:1.05;color:#666;font-weight:900;text-transform:uppercase}
.dark .label{color:#cbd5e1}
.value{font-size:21px;line-height:1.1;font-weight:950;margin-top:2px}
.dateTitle{text-align:center;font-size:17px;font-weight:900;margin:4px 0 10px}
.hide{display:none}
.op{background:white;border:1px solid #e5e7eb;border-radius:12px;padding:9px;margin:7px 0}
.opline{display:flex;align-items:center;gap:7px;font-size:16px;font-weight:900}
.opname{margin-left:auto;font-weight:800}
.time{font-size:12px;color:#667085;margin-top:3px}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:7px}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.smallBox{background:#eef0f3;border-radius:11px;padding:7px}
.smallBox .label{font-size:12px}
.smallBox .value{font-size:16px}
.day{background:#fff;border:1px solid #e5e7eb;border-radius:13px;margin:9px 0;padding:9px}
.dayHead{font-size:15px;font-weight:900;margin-bottom:8px}
</style>
</head>

<body>
<div class="app">

<div class="tabs">
  <button id="tabHoy" class="tab on" onclick="tab('hoy')">HOY</button>
  <button id="tabDetalle" class="tab" onclick="tab('detalle')">DETALLE</button>
  <button id="tabHistorial" class="tab" onclick="tab('historial')">HISTORIAL</button>
</div>

<section id="hoy">
  <div class="card">
    <div class="dateTitle" id="fechaLarga"></div>

    <div class="grid">
      <button id="btnC" onclick="tipo='C';pintarTipo()">Compra</button>
      <button id="btnV" class="on" onclick="tipo='V';pintarTipo()">Venta</button>
    </div>

    <input id="nom" list="nombres" placeholder="Nombre" autocomplete="off" style="margin-top:6px">
    <datalist id="nombres"></datalist>

    <div class="grid" style="margin-top:6px">
      <input id="usd" type="number" inputmode="decimal" placeholder="USD" oninput="totalAuto()">
      <input id="cot" type="number" inputmode="decimal" placeholder="Cotización" oninput="totalAuto()">
    </div>

    <div class="box">
      <div class="label">Total pesos</div>
      <div class="value" id="total">$0</div>
    </div>

    <div class="grid" style="margin-top:6px">
      <button class="btn" id="saveBtn" onclick="guardar()">Guardar op.</button>
      <button class="wsp" onclick="wspUltima()">Enviar Wsp</button>
    </div>
  </div>
    <div class="card">

    <div class="grid">
      <div class="box">
        <div class="label">Compras</div>
        <div class="value" id="compras">USD 0</div>
      </div>

      <div class="box">
        <div class="label">Ventas</div>
        <div class="value" id="ventas">USD 0</div>
      </div>
    </div>

    <div class="box dark">
      <div class="label">Posición vendida en USD</div>
      <div class="value" id="posicion">USD 0</div>
    </div>

    <div class="box">
      <div class="label">Posición vendida en pesos</div>
      <div class="value" id="posPesos">$0</div>
    </div>

    <div class="box">
      <div class="label">Precio venta cierre</div>
      <input id="cierre" type="number" value="1425" inputmode="decimal" oninput="renderHoy()">
    </div>

    <div class="box">
      <div class="label">Ganancia</div>
      <div class="value" id="ganancia">$0</div>
    </div>

    <button class="btn" style="margin-top:6px" onclick="archivarDia()">
      Archivar día
    </button>

  </div>
</section>

<section id="detalle" class="hide">
  <div class="card">
    <div class="dateTitle">Detalle del día</div>
    <div id="detalleLista"></div>
  </div>
</section>

<section id="historial" class="hide">
  <div class="card">

    <input
      id="buscar"
      placeholder="Buscar fecha o nombre..."
      oninput="renderHistorial()"
    >

    <div id="historialLista" style="margin-top:8px"></div>

  </div>
</section>

</div>

<script>

let tipo='V';
let editando=null;

let ops=JSON.parse(localStorage.getItem('ops')||'[]');
let historial=JSON.parse(localStorage.getItem('historialOps')||'[]');

function g(id){
  return document.getElementById(id);
}

function ars(x){
  return '$'+Math.round(x||0).toLocaleString('es-AR');
}

function usd(x){
  return 'USD '+Math.round(x||0).toLocaleString('es-AR');
}
function fechaHoy(){
  return new Date().toISOString().slice(0,10);
}

function totalAuto(){
  g('total').innerText=ars(
    Number(g('usd').value||0)*
    Number(g('cot').value||0)
  );
}

function pintarTipo(){
  g('btnC').className=tipo==='C'?'on':'';
  g('btnV').className=tipo==='V'?'on':'';
}

renderHoy();
renderDetalle();
renderHistorial();

</script>
</body>
</html>
